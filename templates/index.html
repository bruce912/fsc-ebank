<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FSC 電子支付資料系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--sidebar-w:220px;--primary:#1a56db;--bg:#f0f4f8}
body{background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
#sidebar{width:var(--sidebar-w);min-height:100vh;background:#1e293b;position:fixed;top:0;left:0;z-index:100;padding-top:0}
#sidebar .brand{padding:18px 16px;background:#0f172a;color:#fff;font-weight:700;font-size:15px;border-bottom:1px solid #334155}
#sidebar .nav-link{color:#94a3b8;padding:10px 16px;border-radius:6px;margin:2px 8px;display:flex;align-items:center;gap:8px;transition:.15s}
#sidebar .nav-link:hover,#sidebar .nav-link.active{background:#334155;color:#fff}
#sidebar .nav-link i{font-size:16px;width:20px}
#main{margin-left:var(--sidebar-w);padding:24px}
.page{display:none}.page.active{display:block}
.card{border:none;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-header{background:#fff;border-bottom:1px solid #e2e8f0;border-radius:12px 12px 0 0!important;padding:14px 18px;font-weight:600}
.stat-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:.2s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)}
.stat-num{font-size:24px;font-weight:700;color:#1e293b}
.stat-label{color:#64748b;font-size:12px}
.table th{background:#f8fafc;font-weight:600;font-size:13px;white-space:nowrap}
.table td{white-space:nowrap;font-size:13px}
.diff-up{color:#16a34a;font-weight:600}
.diff-down{color:#dc2626;font-weight:600}
.diff-neutral{color:#64748b}
.badge-up{background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:99px;font-size:12px}
.badge-down{background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:99px;font-size:12px}
.badge-neutral{background:#f1f5f9;color:#64748b;padding:2px 8px;border-radius:99px;font-size:12px}
.page-title{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.filter-bar{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-bar label{font-size:12px;font-weight:600;color:#64748b;margin-bottom:3px;display:block}
select.form-select,input.form-control{font-size:13px;border-radius:7px;border-color:#e2e8f0}
.btn-primary{background:var(--primary);border-color:var(--primary);border-radius:7px;font-size:13px}
.chart-box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
#toast-container{position:fixed;top:16px;right:16px;z-index:9999}
.import-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:40px;text-align:center;background:#fff;cursor:pointer;transition:.2s}
.import-zone:hover,.import-zone.dragover{border-color:var(--primary);background:#eff6ff}
.import-zone i{font-size:40px;color:#94a3b8}
.pagination .page-link{font-size:12px;padding:5px 10px;border-radius:5px!important;margin:0 2px;border:1px solid #e2e8f0}
.pagination .page-item.active .page-link{background:var(--primary);border-color:var(--primary)}
.table-responsive{border-radius:0 0 12px 12px}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;margin:-24px -24px 24px;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.05)}
</style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="brand"><i class="bi bi-bank2 me-2"></i>FSC 資料系統</div>
  <ul class="nav flex-column mt-2">
    <li class="nav-item"><a class="nav-link active" href="#" data-page="dashboard"><i class="bi bi-speedometer2"></i>儀表板</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-page="browse"><i class="bi bi-table"></i>資料瀏覽</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-page="compare"><i class="bi bi-bar-chart-steps"></i>月份比較</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-page="trend"><i class="bi bi-graph-up-arrow"></i>趨勢圖</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-page="import"><i class="bi bi-cloud-upload"></i>匯入資料</a></li>
  </ul>
</nav>

<!-- Main -->
<div id="main">

<!-- ── 儀表板 ── -->
<div class="page active" id="page-dashboard">
  <div class="topbar">
    <div class="page-title mb-0"><i class="bi bi-speedometer2 text-primary"></i>儀表板</div>
    <small class="text-muted" id="db-update-time"></small>
  </div>
  <div id="dashboard-kpi"></div>
</div>

<!-- ── 資料瀏覽 ── -->
<div class="page" id="page-browse">
  <div class="topbar">
    <div class="page-title mb-0"><i class="bi bi-table text-primary"></i>資料瀏覽</div>
  </div>
  <div class="filter-bar">
    <div><label>資料表</label>
      <select id="browse-table" class="form-select" style="width:220px"></select>
    </div>
    <div><label>起始年</label><input id="browse-yr-from" type="number" class="form-control" style="width:90px" placeholder="全部"></div>
    <div><label>結束年</label><input id="browse-yr-to" type="number" class="form-control" style="width:90px" placeholder="全部"></div>
    <div><label>月份</label>
      <select id="browse-mn" class="form-select" style="width:80px">
        <option value="">全部</option>
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
    </div>
    <div><label>機構</label><select id="browse-org" class="form-select" style="width:160px"><option value="">全部</option></select></div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" onclick="browseLoad(1)"><i class="bi bi-search me-1"></i>查詢</button>
      <button class="btn btn-outline-secondary" onclick="browseExport()"><i class="bi bi-download me-1"></i>匯出CSV</button>
    </div>
  </div>
  <div class="card">
    <div class="card-header d-flex justify-content-between">
      <span id="browse-count">共 0 筆</span>
      <div id="browse-pagination" class="d-flex gap-1"></div>
    </div>
    <div class="table-responsive">
      <table class="table table-hover table-sm mb-0" id="browse-table-el">
        <thead><tr id="browse-thead"></tr></thead>
        <tbody id="browse-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── 月份比較 ── -->
<div class="page" id="page-compare">
  <div class="topbar">
    <div class="page-title mb-0"><i class="bi bi-bar-chart-steps text-primary"></i>月份比較</div>
  </div>
  <div class="filter-bar">
    <div><label>資料表</label><select id="cmp-table" class="form-select" style="width:200px"></select></div>
    <div><label>機構</label><select id="cmp-org" class="form-select" style="width:150px"><option value="">全部合計</option></select></div>
    <div><label>比較月份 A</label><select id="cmp-m1" class="form-select" style="width:120px"></select></div>
    <div><label>比較月份 B</label><select id="cmp-m2" class="form-select" style="width:120px"></select></div>
    <button class="btn btn-primary" onclick="compareLoad()"><i class="bi bi-arrow-left-right me-1"></i>比較</button>
  </div>
  <div class="row g-3">
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header" id="cmp-card-title">差異明細</div>
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead><tr>
              <th>欄位</th>
              <th class="text-end" id="cmp-h1">月份 A</th>
              <th class="text-end" id="cmp-h2">月份 B</th>
              <th class="text-end">差異</th>
              <th class="text-center">變動</th>
            </tr></thead>
            <tbody id="cmp-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="chart-box">
        <strong class="d-block mb-3">對比圖</strong>
        <canvas id="chart-compare" height="300"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- ── 趨勢圖 ── -->
<div class="page" id="page-trend">
  <div class="topbar">
    <div class="page-title mb-0"><i class="bi bi-graph-up-arrow text-primary"></i>趨勢分析</div>
  </div>
  <div class="filter-bar">
    <div><label>資料表</label><select id="trend-table" class="form-select" style="width:200px" onchange="trendTableChange()"></select></div>
    <div><label>欄位</label><select id="trend-col" class="form-select" style="width:220px"></select></div>
    <div><label>機構</label><select id="trend-org" class="form-select" style="width:150px"><option value="">全部合計</option></select></div>
    <button class="btn btn-primary" onclick="trendLoad()"><i class="bi bi-graph-up me-1"></i>顯示</button>
  </div>
  <div class="row g-3">
    <div class="col-12">
      <div class="chart-box">
        <canvas id="chart-trend" height="120"></canvas>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-header">統計摘要</div>
        <div class="card-body" id="trend-stats"></div>
      </div>
    </div>
    <div class="col-md-8">
      <div class="card">
        <div class="card-header">月份明細</div>
        <div class="table-responsive" style="max-height:300px;overflow-y:auto">
          <table class="table table-sm mb-0">
            <thead><tr><th>年/月</th><th class="text-end">數值</th><th class="text-end">月增</th><th class="text-center">趨勢</th></tr></thead>
            <tbody id="trend-detail-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── 匯入資料 ── -->
<div class="page" id="page-import">
  <div class="topbar">
    <div class="page-title mb-0"><i class="bi bi-cloud-upload text-primary"></i>匯入資料</div>
  </div>
  <div class="row g-3">
    <div class="col-md-7">
      <div class="card">
        <div class="card-header">上傳檔案</div>
        <div class="card-body">
          <div class="import-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <i class="bi bi-cloud-arrow-up d-block mb-2"></i>
            <div class="fw-semibold mb-1">點擊或拖曳檔案至此</div>
            <div class="text-muted small">支援 .json（ebank_all_data / ebank_XXXXX）及 .csv 格式</div>
          </div>
          <input type="file" id="file-input" accept=".json,.csv" class="d-none" onchange="fileSelected(this)">
          <div id="file-info" class="mt-3 d-none">
            <div class="d-flex align-items-center gap-2 p-3 bg-light rounded">
              <i class="bi bi-file-earmark-text fs-4 text-primary"></i>
              <div class="flex-grow-1">
                <div class="fw-semibold" id="file-name"></div>
                <div class="text-muted small" id="file-size"></div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="doImport()">
                <i class="bi bi-upload me-1"></i>開始匯入
              </button>
            </div>
          </div>
          <div id="import-progress" class="mt-3 d-none">
            <div class="d-flex align-items-center gap-2">
              <div class="spinner-border spinner-border-sm text-primary"></div>
              <span>匯入中，請稍候...</span>
            </div>
          </div>
          <div id="import-result" class="mt-3 d-none"></div>
        </div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-clock-history me-1"></i>匯入記錄</span>
          <button class="btn btn-sm btn-outline-secondary" onclick="loadImportLog()"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive" style="max-height:400px;overflow-y:auto">
            <table class="table table-sm mb-0">
              <thead><tr><th>時間</th><th>表</th><th class="text-end">新增</th><th class="text-end">跳過</th></tr></thead>
              <tbody id="import-log-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</div><!-- /main -->

<!-- Toast -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Utils ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = v => v == null ? '-' : Number(v).toLocaleString('zh-TW', {maximumFractionDigits:2});

function toast(msg, type='success'){
  const el = document.createElement('div');
  el.className = `alert alert-${type} py-2 px-3 shadow-sm`;
  el.style.cssText = 'min-width:240px;font-size:13px;border-radius:8px';
  el.textContent = msg;
  $('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

async function api(url){
  const r = await fetch(url);
  return r.json();
}

// ── Navigation ─────────────────────────────────────────────
document.querySelectorAll('#sidebar .nav-link').forEach(el=>{
  el.addEventListener('click', e=>{
    e.preventDefault();
    document.querySelectorAll('#sidebar .nav-link').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    const page = el.dataset.page;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    $('page-'+page).classList.add('active');
    if(page==='dashboard') loadDashboard();
    if(page==='browse') initBrowse();
    if(page==='compare') initCompare();
    if(page==='trend') initTrend();
    if(page==='import') loadImportLog();
  });
});

// ══════════════════════════════════════════════════════════
// Dashboard
// ══════════════════════════════════════════════════════════
function fmtBig(v){
  if(v==null) return '-';
  const n = Math.abs(v);
  if(n>=1e8)  return (v/1e8).toFixed(2)+'億';
  if(n>=1e4)  return (v/1e4).toFixed(1)+'萬';
  return Number(v).toLocaleString('zh-TW');
}

function trendBadge(pct){
  if(pct==null) return '<span class="badge-neutral small">─</span>';
  const abs = Math.abs(pct).toFixed(2);
  if(pct>0)  return `<span class="badge-up small">▲${abs}%</span>`;
  if(pct<0)  return `<span class="badge-down small">▼${abs}%</span>`;
  return '<span class="badge-neutral small">─</span>';
}

async function loadDashboard(){
  $('db-update-time').textContent = '最後讀取：'+new Date().toLocaleString('zh-TW');
  const groups = await api('/api/dashboard');

  $('dashboard-kpi').innerHTML = groups.map(g=>`
    <div class="mb-4">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="fw-bold fs-6 text-dark">${g.group}</span>
        <span class="badge bg-secondary fw-normal">${g.table}</span>
        <small class="text-muted ms-1">最新：${g.latest_ym}
          ${g.prev_ym?`<span class="text-muted">（對比 ${g.prev_ym}）</span>`:''}
        </small>
        <button class="btn btn-sm btn-outline-primary ms-auto py-0 px-2"
                style="font-size:12px" onclick="goBrowse('${g.table}')">
          <i class="bi bi-table me-1"></i>瀏覽
        </button>
      </div>
      <div class="row g-2">
        ${g.kpis.map(k=>`
          <div class="col-6 col-md-4 col-lg-3 col-xl-2">
            <div class="stat-card h-100" style="cursor:default">
              <div class="stat-label mb-1">${k.label}</div>
              <div class="stat-num" style="font-size:20px">${fmtBig(k.value)}</div>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <small class="text-muted">${k.unit}</small>
                ${trendBadge(k.pct)}
              </div>
              ${k.prev!=null?`<div class="text-muted" style="font-size:11px;margin-top:3px">
                前月：${fmtBig(k.prev)}</div>`:''}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function goBrowse(code){
  document.querySelector('[data-page="browse"]').click();
  setTimeout(()=>{ $('browse-table').value=code; browseLoad(1); },100);
}

// ══════════════════════════════════════════════════════════
// Browse
// ══════════════════════════════════════════════════════════
let browsePage = 1, browseTotal = 0, browsePerPage = 50;
let browseData = {columns:[], rows:[]};

async function initBrowse(){
  const tables = await api('/api/tables');
  $('browse-table').innerHTML = tables.map(t=>`<option value="${t.code}">${t.code} ${t.desc}</option>`).join('');
  $('browse-table').addEventListener('change', ()=>loadBrowseOrgs());
  await loadBrowseOrgs();
  browseLoad(1);
}

async function loadBrowseOrgs(){
  const code = $('browse-table').value;
  const data = await api(`/api/table/${code}/data?per_page=1`);
  $('browse-org').innerHTML = '<option value="">全部</option>' +
    data.orgs.map(o=>`<option>${o}</option>`).join('');
}

async function browseLoad(page){
  browsePage = page||1;
  const code = $('browse-table').value;
  const yr   = $('browse-yr-from').value;
  const yrTo = $('browse-yr-to').value;
  const mn   = $('browse-mn').value;
  const org  = $('browse-org').value;
  let url = `/api/table/${code}/data?page=${browsePage}&per_page=${browsePerPage}`;
  if(yr)   url+=`&yr=${yr}`;
  if(yrTo) url+=`&yr_to=${yrTo}`;
  if(mn)   url+=`&mn=${mn}`;
  if(org)  url+=`&org=${encodeURIComponent(org)}`;

  const data = await api(url);
  browseData = data;
  browseTotal = data.total;

  $('browse-count').textContent = `共 ${data.total.toLocaleString()} 筆`;
  $('browse-thead').innerHTML = data.columns.map(c=>`<th>${c}</th>`).join('');
  $('browse-tbody').innerHTML = data.rows.map(r=>
    `<tr>${r.map(v=>`<td>${v!=null?v:''}</td>`).join('')}</tr>`
  ).join('');

  // Pagination
  const totalPages = Math.ceil(data.total / browsePerPage);
  let pages = '';
  if(totalPages > 1){
    pages += `<button class="btn btn-sm btn-outline-secondary" ${browsePage<=1?'disabled':''} onclick="browseLoad(${browsePage-1})">‹</button>`;
    const start = Math.max(1, browsePage-2), end = Math.min(totalPages, browsePage+2);
    if(start>1) pages+=`<span class="btn btn-sm btn-outline-secondary disabled">…</span>`;
    for(let i=start;i<=end;i++)
      pages+=`<button class="btn btn-sm ${i===browsePage?'btn-primary':'btn-outline-secondary'}" onclick="browseLoad(${i})">${i}</button>`;
    if(end<totalPages) pages+=`<span class="btn btn-sm btn-outline-secondary disabled">…</span>`;
    pages+=`<button class="btn btn-sm btn-outline-secondary" ${browsePage>=totalPages?'disabled':''} onclick="browseLoad(${browsePage+1})">›</button>`;
  }
  $('browse-pagination').innerHTML = pages;
}

function browseExport(){
  const code = $('browse-table').value;
  const yr   = $('browse-yr-from').value;
  const yrTo = $('browse-yr-to').value;
  const mn   = $('browse-mn').value;
  const org  = $('browse-org').value;
  let url = `/api/table/${code}/export?`;
  if(yr)   url+=`yr=${yr}&`;
  if(yrTo) url+=`yr_to=${yrTo}&`;
  if(mn)   url+=`mn=${mn}&`;
  if(org)  url+=`org=${encodeURIComponent(org)}&`;
  window.open(url, '_blank');
}

// ══════════════════════════════════════════════════════════
// Compare
// ══════════════════════════════════════════════════════════
let cmpChart = null;

async function initCompare(){
  const tables = await api('/api/tables');
  $('cmp-table').innerHTML = tables.filter(t=>t.yr_range).map(t=>`<option value="${t.code}">${t.code} ${t.desc}</option>`).join('');
  $('cmp-table').addEventListener('change', cmpTableChange);
  await cmpTableChange();
}

async function cmpTableChange(){
  const code = $('cmp-table').value;
  const [months, data] = await Promise.all([
    api(`/api/table/${code}/months`),
    api(`/api/table/${code}/data?per_page=1`)
  ]);
  const opts = months.map(m=>`<option value="${m.yr}_${m.mn}">${m.label}</option>`).join('');
  $('cmp-m1').innerHTML = opts;
  $('cmp-m2').innerHTML = opts;
  if(months.length>1) $('cmp-m2').selectedIndex=1;
  $('cmp-org').innerHTML = '<option value="">全部合計</option>' + data.orgs.map(o=>`<option>${o}</option>`).join('');
}

async function compareLoad(){
  const code = $('cmp-table').value;
  const m1v = $('cmp-m1').value.split('_');
  const m2v = $('cmp-m2').value.split('_');
  const org = $('cmp-org').value;
  let url = `/api/table/${code}/compare?yr1=${m1v[0]}&mn1=${m1v[1]}&yr2=${m2v[0]}&mn2=${m2v[1]}`;
  if(org) url+=`&org=${encodeURIComponent(org)}`;

  const data = await api(url);
  if(data.error){ toast(data.error,'danger'); return; }

  $('cmp-h1').textContent = data.label1;
  $('cmp-h2').textContent = data.label2;
  $('cmp-card-title').textContent = `${data.label1} vs ${data.label2} 差異明細`;

  // Filter rows with actual values
  const rows = data.rows.filter(r=>r.v1!=null||r.v2!=null);
  $('cmp-tbody').innerHTML = rows.map(r=>{
    const pctStr = r.pct!=null ? `${r.pct>=0?'+':''}${r.pct}%` : '-';
    const cls = r.pct>0?'diff-up':r.pct<0?'diff-down':'diff-neutral';
    const badge = r.pct>0?`<span class="badge-up">▲${Math.abs(r.pct)}%</span>`
                 :r.pct<0?`<span class="badge-down">▼${Math.abs(r.pct)}%</span>`
                 :`<span class="badge-neutral">─</span>`;
    const diffStr = r.diff!=null?(r.diff>=0?'+':'')+fmt(r.diff):'-';
    return `<tr>
      <td>${r.col}</td>
      <td class="text-end">${fmt(r.v1)}</td>
      <td class="text-end">${fmt(r.v2)}</td>
      <td class="text-end ${cls}">${diffStr}</td>
      <td class="text-center">${badge}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" class="text-center text-muted">無資料</td></tr>';

  // Radar chart — 正規化後兩月份比較（取差異最大的前8項）
  const top8 = [...rows].filter(r=>r.v1!=null&&r.v2!=null&&(r.v1>0||r.v2>0))
    .sort((a,b)=>Math.abs(b.pct||0)-Math.abs(a.pct||0)).slice(0,8);
  if(cmpChart) cmpChart.destroy();
  if(top8.length>0){
    // 各欄正規化到最大值=100，方便雷達圖呈現
    const normalize = (val,max) => max>0 ? Math.round(val/max*100) : 0;
    const maxes = top8.map(r=>Math.max(r.v1||0,r.v2||0));
    cmpChart = new Chart($('chart-compare'),{
      type:'radar',
      data:{
        labels: top8.map(r=>r.col.length>8?r.col.slice(0,8)+'…':r.col),
        datasets:[
          {label:data.label1,
           data:top8.map((r,i)=>normalize(r.v1,maxes[i])),
           borderColor:'rgba(99,102,241,0.9)',backgroundColor:'rgba(99,102,241,0.15)',
           pointBackgroundColor:'rgba(99,102,241,1)',pointRadius:4,borderWidth:2},
          {label:data.label2,
           data:top8.map((r,i)=>normalize(r.v2,maxes[i])),
           borderColor:'rgba(234,88,12,0.9)',backgroundColor:'rgba(234,88,12,0.15)',
           pointBackgroundColor:'rgba(234,88,12,1)',pointRadius:4,borderWidth:2}
        ]
      },
      options:{
        scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:10}},pointLabels:{font:{size:11}}}},
        plugins:{
          legend:{position:'top'},
          tooltip:{callbacks:{label:c=>{
            const r=top8[c.dataIndex];
            const v=c.datasetIndex===0?r.v1:r.v2;
            return `${c.dataset.label}: ${v!=null?v.toLocaleString():'-'}`;
          }}}
        },
        maintainAspectRatio:false
      }
    });
  }
}

// ══════════════════════════════════════════════════════════
// Trend
// ══════════════════════════════════════════════════════════
let trendChart = null;

async function initTrend(){
  const tables = await api('/api/tables');
  $('trend-table').innerHTML = tables.filter(t=>t.yr_range).map(t=>`<option value="${t.code}">${t.code} ${t.desc}</option>`).join('');
  await trendTableChange();
}

async function trendTableChange(){
  const code = $('trend-table').value;
  const [cols, data] = await Promise.all([
    api(`/api/table/${code}/columns`),
    api(`/api/table/${code}/data?per_page=1`)
  ]);
  const numCols = cols.filter(c=>c.numeric && !['yr','mn'].includes(c.name));
  $('trend-col').innerHTML = numCols.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  $('trend-org').innerHTML = '<option value="">全部合計</option>' + data.orgs.map(o=>`<option>${o}</option>`).join('');
}

async function trendLoad(){
  const code = $('trend-table').value;
  const col  = $('trend-col').value;
  const org  = $('trend-org').value;
  if(!col){ toast('請選擇欄位','warning'); return; }

  let url = `/api/table/${code}/trend?col=${encodeURIComponent(col)}`;
  if(org) url+=`&org=${encodeURIComponent(org)}`;

  const rows = await api(url);
  const valid = rows.filter(r=>r.val!=null);
  if(!valid.length){ toast('無資料','warning'); return; }

  // Chart
  if(trendChart) trendChart.destroy();
  trendChart = new Chart($('chart-trend'),{
    type:'line',
    data:{
      labels: valid.map(r=>r.label),
      datasets:[{
        label:col,
        data: valid.map(r=>r.val),
        borderColor:'rgba(26,86,219,0.9)',
        backgroundColor:'rgba(26,86,219,0.08)',
        fill:true,
        tension:0.3,
        pointRadius:3,
        pointHoverRadius:5
      }]
    },
    options:{
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toLocaleString()}`}}},
      scales:{y:{ticks:{callback:v=>v.toLocaleString()}},x:{ticks:{maxTicksLimit:18,font:{size:10}}}},
      maintainAspectRatio:false
    }
  });

  // Stats
  const vals = valid.map(r=>r.val);
  const mn_val=Math.min(...vals), mx_val=Math.max(...vals), avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const last=valid[valid.length-1].val, prev=valid.length>1?valid[valid.length-2].val:null;
  const mom = prev?((last-prev)/Math.abs(prev)*100).toFixed(1):null;
  $('trend-stats').innerHTML = `
    <div class="row g-2 text-center">
      <div class="col-6"><div class="p-2 bg-light rounded"><div class="text-muted small">最新</div><div class="fw-bold">${fmt(last)}</div></div></div>
      <div class="col-6"><div class="p-2 bg-light rounded"><div class="text-muted small">月增率</div>
        <div class="fw-bold ${mom>0?'text-success':mom<0?'text-danger':''}">${mom!=null?(mom>=0?'+':'')+mom+'%':'-'}</div></div></div>
      <div class="col-6"><div class="p-2 bg-light rounded"><div class="text-muted small">最大值</div><div class="fw-bold">${fmt(mx_val)}</div></div></div>
      <div class="col-6"><div class="p-2 bg-light rounded"><div class="text-muted small">平均值</div><div class="fw-bold">${fmt(avg)}</div></div></div>
      <div class="col-12"><div class="p-2 bg-light rounded"><div class="text-muted small">資料期間</div><div class="fw-bold small">${valid[0].label} ～ ${valid[valid.length-1].label}（${valid.length}個月）</div></div></div>
    </div>`;

  // Detail table with MoM
  $('trend-detail-tbody').innerHTML = [...valid].reverse().map((r,i,arr)=>{
    const prv = arr[i+1];
    const m = prv&&prv.val?((r.val-prv.val)/Math.abs(prv.val)*100).toFixed(1):null;
    const badge = m==null?'' : m>=0
      ? `<span class="badge-up">▲${Math.abs(m)}%</span>`
      : `<span class="badge-down">▼${Math.abs(m)}%</span>`;
    const mStr = m==null?'-':(m>=0?'+':'')+m+'%';
    return `<tr><td>${r.label}</td><td class="text-end">${fmt(r.val)}</td><td class="text-end ${m>0?'diff-up':m<0?'diff-down':''}">${mStr}</td><td class="text-center">${badge}</td></tr>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// Import
// ══════════════════════════════════════════════════════════
let selectedFile = null;

const dropZone = $('drop-zone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault(); dropZone.classList.remove('dragover');
  if(e.dataTransfer.files[0]) showFileInfo(e.dataTransfer.files[0]);
});

function fileSelected(inp){ if(inp.files[0]) showFileInfo(inp.files[0]); }

function showFileInfo(file){
  selectedFile = file;
  $('file-name').textContent = file.name;
  $('file-size').textContent = (file.size/1024).toFixed(1)+' KB';
  $('file-info').classList.remove('d-none');
  $('import-result').classList.add('d-none');
}

async function doImport(){
  if(!selectedFile){ toast('請先選擇檔案','warning'); return; }
  $('import-progress').classList.remove('d-none');
  $('import-result').classList.add('d-none');

  const fd = new FormData();
  fd.append('file', selectedFile);
  try{
    const r = await fetch('/api/import',{method:'POST',body:fd});
    const data = await r.json();
    $('import-progress').classList.add('d-none');
    if(data.error){
      $('import-result').innerHTML=`<div class="alert alert-danger">${data.error}</div>`;
    } else {
      const rows = data.results.map(r=>`<tr><td>${r.table}</td><td class="text-success text-end">+${r.added}</td><td class="text-muted text-end">${r.skipped}</td></tr>`).join('');
      $('import-result').innerHTML=`
        <div class="alert alert-success">
          <strong>匯入完成！</strong> 新增 ${data.total_added} 筆，跳過重複 ${data.total_skipped} 筆
        </div>
        <table class="table table-sm"><thead><tr><th>資料表</th><th class="text-end">新增</th><th class="text-end">跳過</th></tr></thead><tbody>${rows}</tbody></table>`;
      toast(`成功匯入 ${data.total_added} 筆資料`);
      loadImportLog();
    }
    $('import-result').classList.remove('d-none');
  }catch(e){
    $('import-progress').classList.add('d-none');
    $('import-result').innerHTML=`<div class="alert alert-danger">${e.message}</div>`;
    $('import-result').classList.remove('d-none');
  }
}

async function loadImportLog(){
  const logs = await api('/api/import_log');
  $('import-log-tbody').innerHTML = logs.map(l=>`
    <tr>
      <td><small>${l.imported_at.slice(5,16).replace('T',' ')}</small></td>
      <td><span class="badge bg-secondary">${l.table_code}</span></td>
      <td class="text-end text-success">+${l.rows_added}</td>
      <td class="text-end text-muted">${l.rows_skipped}</td>
    </tr>`).join('') || '<tr><td colspan="4" class="text-center text-muted py-3">尚無記錄</td></tr>';
}

// ── Init ───────────────────────────────────────────────────
loadDashboard();
</script>
